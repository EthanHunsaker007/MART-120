<html>
    <head>
        <title>Contact Form</title>
        <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
        <link rel="stylesheet" href="styles.css">     
        <script src="bootstrap/js/jquery-4.0.0.min.js"></script>
        <script src="bootstrap/js/bootstrap.min.js"></script>   

        <script>
            function submitClicked() {
                var name = document.getElementById("name");
                var email = document.getElementById("email");   
                var tos = document.getElementById("tos");   

                if (email.value == "") {
                    email.style.backgroundColor = "red";
                    email.focus();
                } else {
                    email.style.backgroundColor = '303633';
                }

                if (name.value == "") {
                    name.style.backgroundColor = "red";
                    name.focus();
                } else {
                    name.style.backgroundColor = '303633';
                }

                if (tos.checked == false) {
                    window.alert("You must agree to the terms of service to proceed");
                }

                if (email.value != "" && name.value != "" && tos.checked) {
                    name.value = "";
                    email.value = "";
                    tos.checked = false;
                }
            }
        </script>
    </head>
    <body>
        <h1>Contact Me:</h1>
        <div class="contact_form">
            <form action="nextPage.html" type="Post">
                <h3>Full Name: <input type="text" id="name" placeholder="John Smith"></h3>
                <h3>E-Mail: <input type="text" id="email" placeholder="example@gmail.com"></h3>
                <h3>Accept TOS? <input type="checkbox" id="tos"></h3>
                <button type="button" id="submit" onclick="submitClicked()">Submit Form</button>
            </form>
        </div>

        <div class="page_buttons">
            <a href="index.html" class="btn btn-default" style="font-family: monospace;">Home Page</a>
            <a href="page_two.html" class="btn btn-default" style="font-family: monospace;">Short Story</a>
            <a href="page_four.html" class="btn btn-default" style="font-family: monospace;">Math Game</a>
        </div>
    </body>
</htmL>
